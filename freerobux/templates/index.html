<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Bedava Robux</title>
<style>
body{
    margin:0;
    height:100vh;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}
.kutu{
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    padding:40px;
    border-radius:20px;
    width:350px;
    text-align:center;
    color:white;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}
h1{ margin-bottom:30px; }
input{
    width:90%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    outline:none;
}
button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #00c6ff;
}
.mesaj{ margin-top:20px; font-weight:bold; font-size:16px; }
#dogrulama{ display:none; margin-top:20px; max-width:100%; cursor:pointer; }
</style>
</head>

<body>
<div class="kutu">
<h1>💎 BEDAVA ROBUX</h1>

<form id="robuxForm">
<input type="text" placeholder="Adınız" required>
<input type="number" placeholder="Miktar (Max 500)" max="500" required>
<br>
<button type="submit">Gönder</button>
</form>

<div class="mesaj" id="mesaj"></div>

<img id="dogrulama" src="Logoya tıklayın ve takip edin..png" alt="Doğrulama Görseli">

</div>

<script>
const form = document.getElementById("robuxForm");
const mesaj = document.getElementById("mesaj");
const dogrulama = document.getElementById("dogrulama");

form.addEventListener("submit", function(e){
    e.preventDefault();

    // 1. adım: Gönderiliyor mesajı 5 saniye
    mesaj.textContent = "Gönderiliyor...";
    dogrulama.style.display = "none";

    setTimeout(() => {
        // 2. adım: Doğrulama mesajı 2 saniye
        mesaj.textContent = "Doğrulama adımlarını tamamlayın.";

        setTimeout(() => {
            // 3. adım: yönlendirme
            window.location.href = "/dogrulamasayfasi";
        }, 2000);
    }, 5000);
});

// Logoya tıklayınca Instagram / YouTube yönlendirme
dogrulama.addEventListener("click", function(event){
    let x = event.offsetX;
    if(x < this.width/2){
        window.open("https://www.instagram.com/dogrulamasayfasi/", "_blank");
    } else {
        window.open("https://www.youtube.com/@komikyorumcumtr", "_blank");
    }
});
</script>

</body>
</html>
