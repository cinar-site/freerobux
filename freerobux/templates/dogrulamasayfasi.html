<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Doğrulama</title>

<style>
body{
    margin:0;
    height:100vh;
    font-family:Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

.kapsayici{
    position:absolute;
    top:50%;
    left:30%;
    transform:translate(-50%,-50%);
}

.satir{
    display:flex;
    align-items:center;
    margin-bottom:80px;
}

.numara{
    font-size:28px;
    margin-right:20px;
}

.logo{
    width:70px;
    cursor:pointer;
    transition:0.3s;
}

.logo:hover{
    transform:scale(1.1);
}

.yazi{
    margin-left:20px;
    font-size:22px;
}

.aciklama{
    font-size:22px;
    max-width:420px;
}
</style>
</head>

<body>

<div class="kapsayici">

<div class="satir">
<div class="numara">1</div>
<img class="logo"
src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png"
onclick="window.open('https://www.instagram.com/dogrulamasayfasi/','_blank')">
<div class="yazi">Takip edin.</div>
</div>

<div class="satir">
<div class="numara">2</div>
<img class="logo"
src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png"
onclick="window.open('https://www.youtube.com/@komikyorumcumtr','_blank')">
<div class="yazi">Takip edin.</div>
</div>

<div class="satir">
<div class="numara">3</div>
<div class="aciklama">Bu sayfadaki bir reklama tıklayın ve 30 saniye boyunca gezinin.</div>
</div>

</div>

</body>
</html>
